<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>M叽</title>

    <script>
    // M叽紧急清缓存：防止旧 service worker 把 CSS 当页面吐出来
    (function(){
      try { if ('caches' in window) caches.keys().then(keys => keys.forEach(k => caches.delete(k))); } catch(e) {}
    })();
    </script>

    <meta name="theme-color" content="#6e6e73">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="M叽">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <link rel="stylesheet" href="style.css?v=20260618-hardrecover1">
    <link rel="stylesheet" href="desktop-style-theme.css?v=20260618-hardrecover1">
    <link rel="manifest" href="manifest.json?v=20260618-hardrecover1">
</head>
<body>

<div class="phone desktop-phone" id="desktopRoot">
    <input type="file" id="desktopWallpaperFile" accept="image/*" hidden>
    <input type="file" id="musicCoverFile" accept="image/*" hidden>

    <div class="desktop-bg" id="desktopBg"></div>
    <button id="mjiDesktopFullscreenBtn" type="button" aria-label="全屏">⛶</button>

    <div class="desktop-main">
        <div class="music-widget" onclick="openApp('radio')">
            <div class="music-cover" id="musicCover" onclick="event.stopPropagation(); pickMusicCover()">♪</div>
            <div class="music-info">
                <div class="music-title" id="musicTitle">点击打开电台</div>
                <div class="music-artist" id="musicArtist">—</div>
                <div class="music-progress"><div id="musicBar"></div></div>
            </div>
            <div class="music-actions">
                <button onclick="event.stopPropagation(); toggleFakeMusicPlay()" id="musicPlayBtn">▶</button>
                <button onclick="event.stopPropagation(); openApp('radio')">♫</button>
            </div>
        </div>

        <div class="desktop-time-row">
            <div class="desktop-time" id="desktopTime">00:00</div>
            <div class="desktop-weather" id="desktopWeather" onclick="openApp('weather')">☁️ 22°C</div>
        </div>

        <div class="calendar-card" onclick="openApp('schedule')">
            <div class="calendar-title" id="calendarTitle">2026年6月</div>
            <div class="calendar-week-head">
                <span>SUN</span><span>MON</span><span>TUE</span><span>WED</span><span>THU</span><span>FRI</span><span>SAT</span>
            </div>
            <div class="calendar-days" id="calendarDays"></div>
        </div>

        <div class="desktop-pager">
            <div class="desktop-pages" id="desktopPages">
                <div class="desktop-page">
                    <button class="desktop-app" onclick="openApp('memory')"><span>◉</span><em>记忆</em></button>
                    <button class="desktop-app" onclick="openApp('door')"><span>⌂</span><em>门</em></button>
                    <button class="desktop-app" onclick="openApp('forum')"><span>⌘</span><em>论坛</em></button>
                    <button class="desktop-app" onclick="openApp('hacker')"><span>⌁</span><em>入侵</em></button>
                    <button class="desktop-app" onclick="openApp('mailbox')"><span>✉</span><em>匿名信箱</em></button>
                    <button class="desktop-app" onclick="openApp('blindbox')"><span>◫</span><em>盲盒</em></button>
                    <button class="desktop-app" onclick="openApp('game')"><span>◈</span><em>游戏</em></button>
                    <button class="desktop-app" onclick="openDesktopPlaceholder('里世界', '里世界后面迁移。')"><span>◎</span><em>里世界</em></button>
                </div>

                <div class="desktop-page">
                    <button class="desktop-app" onclick="openApp('diary')"><span>✎</span><em>日记</em></button>
                    <button class="desktop-app" onclick="openApp('dreamhouse')"><span>◍</span><em>梦男之家</em></button>
                    <button class="desktop-app" onclick="openApp('reading')"><span>⟡</span><em>一起读</em></button>
                    <button class="desktop-app" onclick="openApp('pomodoro')"><span>◔</span><em>番茄钟</em></button>
                </div>
            </div>
        </div>

        <div class="desktop-dots">
            <button id="dot0" class="active" onclick="setDesktopPage(0)"></button>
            <button id="dot1" onclick="setDesktopPage(1)"></button>
        </div>

        <div class="desktop-dock">
            <button onclick="openApp('settings')"><span>◐</span><em>设置</em></button>
            <button id="chatAppIcon" onclick="openApp('chat')"><span>◌</span><em>Chat</em></button>
            <button onclick="openApp('worldbook')"><span>✿</span><em>世界书</em></button>
        </div>
    </div>

    <div id="screen" class="screen hidden">
        <div class="app-header">
            <button id="mjiGlobalBackBtn" type="button" onclick="mjiGoBack ? mjiGoBack() : goHome()" aria-label="返回">‹</button>
            <div id="appTitle">应用</div>
            <button id="mjiFullscreenBtn" type="button" onclick="mjiToggleFullscreen && mjiToggleFullscreen()" aria-label="全屏">⛶</button>
        </div>

        <div id="appContent" class="app-content"></div>
    </div>
</div>

<script src="js/state.js?v=20260618-hardrecover1"></script>
<script src="js/utils.js?v=20260618-hardrecover1"></script>
<script src="js/storage.js?v=20260618-hardrecover1"></script>

<script>
// 注册紧急恢复版 SW：只清缓存，不劫持页面内容
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.getRegistrations && navigator.serviceWorker.getRegistrations().then(function(regs){
      regs.forEach(function(r){ try { r.update && r.update(); } catch(e){} });
    }).catch(function(){});
    navigator.serviceWorker.register('./sw.js?v=20260618-hardrecover1', { scope: './' }).then(function(reg){
      reg.update && reg.update();
    }).catch(function (err) {
      console.warn('SW register failed', err);
    });
  });
}
</script>

</body>
</html>
